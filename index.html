<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>野球盤 Ver4.0</title>
<style>
body{
    margin:0;
    background:#0d1b2a;
    color:white;
    text-align:center;
    font-family:sans-serif;
}
canvas{
    background:#2faa2f;
    margin-top:10px;
    border:4px solid #ccc;
}
#info{
    font-size:18px;
    margin-top:10px;
}
</style>
</head>
<body>

<h2>トップビュー野球盤 Ver4.0</h2>
<canvas id="game" width="600" height="700"></canvas>

<div id="info">
得点: <span id="score">0</span> |
ベスト: <span id="best">0</span><br>
B: <span id="balls">0</span>
S: <span id="strikes">0</span>
O: <span id="outs">0</span>
</div>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let score=0;
let bestScore=0;

let balls=0;
let strikes=0;
let outs=0;

let isRightHand=true;

let homePlate={x:300,y:620};
let batter={x:260,y:620};
let pitcher={x:300,y:250};

let fielders=[
 {x:420,y:420},{x:360,y:340},{x:240,y:340},
 {x:180,y:420},{x:520,y:200},{x:300,y:120},{x:80,y:200}
];

let ball=null;
let state="wait";
let batAngle=0;
let swinging=false;

function updateBatterPosition(){
    if(isRightHand){
        batter.x=homePlate.x-40;
    }else{
        batter.x=homePlate.x+40;
    }
    batter.y=homePlate.y;
}

function newPitch(){
    ball={
        x:300+(Math.random()*60-30),
        y:300,
        vx:0,
        vy:4
    };
    state="pitch";
}
newPitch();

function draw(){
    ctx.clearRect(0,0,600,700);
    ctx.fillStyle="#2faa2f";
    ctx.fillRect(0,0,600,700);

    ctx.strokeStyle="white";
    ctx.lineWidth=3;
    ctx.beginPath();
    ctx.moveTo(homePlate.x,homePlate.y);
    ctx.lineTo(-200,0);
    ctx.moveTo(homePlate.x,homePlate.y);
    ctx.lineTo(800,0);
    ctx.stroke();

    ctx.fillStyle="white";
    ctx.save();
    ctx.translate(homePlate.x,homePlate.y);
    ctx.rotate(Math.PI/4);
    ctx.fillRect(-10,-10,20,20);
    ctx.restore();

    ctx.fillStyle="blue";
    ctx.beginPath();
    ctx.arc(pitcher.x,pitcher.y,15,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle="black";
    ctx.beginPath();
    ctx.arc(batter.x,batter.y,15,0,Math.PI*2);
    ctx.fill();

    ctx.save();
    ctx.translate(batter.x,batter.y);
    ctx.rotate(batAngle);
    ctx.fillStyle="brown";
    ctx.fillRect(-60,-4,60,8);
    ctx.restore();

    ctx.fillStyle="red";
    fielders.forEach(f=>{
        ctx.beginPath();
        ctx.arc(f.x,f.y,12,0,Math.PI*2);
        ctx.fill();
    });

    if(ball){
        ctx.fillStyle="white";
        ctx.beginPath();
        ctx.arc(ball.x,ball.y,8,0,Math.PI*2);
        ctx.fill();
    }
}

function update(){
    if(state==="pitch"){
        ball.y+=ball.vy;

        if(ball.y>680){
            // 見逃し
            strikes++;
            if(strikes>=3){
                addOut();
            }
            endPitch();
        }
    }

    if(state==="hit"){
        ball.x+=ball.vx;
        ball.y+=ball.vy;

        // 外野奥に到達したらヒット
        if(ball.y<100){
            score++;
            if(score>bestScore)bestScore=score;
            resetCount();
            isRightHand=!isRightHand;
            updateBatterPosition();
            endPitch();
            return;
        }

        // 守備に当たったらアウト
        for(let f of fielders){
            let dx=ball.x-f.x;
            let dy=ball.y-f.y;
            if(Math.sqrt(dx*dx+dy*dy)<18){
                addOut();
                endPitch();
                return;
            }
        }
    }

    if(swinging){
        if(isRightHand){
            batAngle-=0.35;
            if(batAngle<=-Math.PI*2){
                swinging=false;
                batAngle=0;
            }
        }else{
            batAngle+=0.35;
            if(batAngle>=Math.PI*2){
                swinging=false;
                batAngle=0;
            }
        }
    }
}

function swing(){
    if(state!=="pitch")return;
    swinging=true;

    if(Math.abs(ball.y-batter.y)<30 &&
       Math.abs(ball.x-batter.x)<70){

        state="hit";
        let angle=(Math.random()*Math.PI/2)+(Math.PI/4);
        let power=7+Math.random()*3;
        ball.vx=power*Math.cos(angle)*(ball.x<300?-1:1);
        ball.vy=-power*Math.sin(angle);
    }else{
        strikes++;
        if(strikes>=3){
            addOut();
        }
        endPitch();
    }
}

function addOut(){
    outs++;
    resetCount();
    if(outs>=3){
        score=0;
        outs=0;
    }
}

function resetCount(){
    balls=0;
    strikes=0;
}

function endPitch(){
    state="wait";
    ball=null;
    setTimeout(()=>{newPitch();},3000);
}

document.addEventListener("keydown",e=>{
    if(e.code==="Space"||e.code==="Enter"){
        swing();
    }
});

function loop(){
    update();
    draw();
    document.getElementById("score").innerText=score;
    document.getElementById("best").innerText=bestScore;
    document.getElementById("balls").innerText=balls;
    document.getElementById("strikes").innerText=strikes;
    document.getElementById("outs").innerText=outs;
    requestAnimationFrame(loop);
}

updateBatterPosition();
loop();
</script>

</body>
</html>
