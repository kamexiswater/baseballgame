<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>野球盤 Ver9.0</title>
<style>
body{
    margin:0;
    background:#0d1b2a;
    color:white;
    text-align:center;
    font-family:sans-serif;
}
canvas{
    background:#2faa2f;
    margin-top:10px;
    border:4px solid #ccc;
}
#info{
    font-size:18px;
    margin-top:10px;
}
</style>
</head>
<body>

<h2>トップビュー野球盤 Ver9.0</h2>
<canvas id="game" width="600" height="700"></canvas>

<div id="info">
得点: <span id="score">0</span> |
ベスト: <span id="best">0</span><br>
B: <span id="balls">0</span>
S: <span id="strikes">0</span>
O: <span id="outs">0</span>
</div>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

let score=0;
let bestScore=0;

let balls=0;
let strikes=0;
let outs=0;

let isRightHand=true;

let homePlate={x:300,y:620,size:40};
let batter={x:260,y:620};
let pitcher={x:300,y:250};

let fielders=[
 {x:420,y:420},{x:360,y:340},{x:240,y:340},
 {x:180,y:420},{x:520,y:200},{x:300,y:120},{x:80,y:200}
];

let ball=null;
let state="wait";
let batAngle=0;
let swinging=false;
let swingProgress=0;

let outfieldEvents=[];

function generateOutfieldEvents(){
    outfieldEvents=[];
    const types=["double","triple","homerun"];

    // シャッフル
    types.sort(()=>Math.random()-0.5);

    let zones=[];
    while(zones.length<3){
        let r=Math.floor(Math.random()*5);
        if(!zones.includes(r)) zones.push(r);
    }

    for(let i=0;i<3;i++){
        outfieldEvents.push({
            zone:zones[i],
            type:types[i]
        });
    }
}

function updateBatterPosition(){
    batter.x = isRightHand ? homePlate.x-50 : homePlate.x+50;
    batter.y = homePlate.y;
}

// ===== 3:1 ピッチ =====
function newPitch(){
    let isStrike=Math.random()<0.75;
    let x;

    if(isStrike){
        x=homePlate.x+(Math.random()*30-15);
    }else{
        x=homePlate.x+(Math.random()*200-100);
        if(Math.abs(x-homePlate.x)<homePlate.size/2){
            x+=120;
        }
    }

    ball={x:x,y:300,vx:0,vy:4};
    state="pitch";
}

generateOutfieldEvents();
newPitch();

function draw(){
    ctx.clearRect(0,0,600,700);

    // ===== 外野イベント可視化 =====
    let zoneWidth=canvas.width/5;
    for(let i=0;i<5;i++){

        let event=outfieldEvents.find(e=>e.zone===i);

        if(event){
            if(event.type==="double") ctx.fillStyle="rgba(0,0,255,0.25)";
            if(event.type==="triple") ctx.fillStyle="rgba(0,255,0,0.25)";
            if(event.type==="homerun") ctx.fillStyle="rgba(255,0,0,0.25)";
        }else{
            ctx.fillStyle="rgba(255,255,255,0.08)";
        }

        ctx.fillRect(i*zoneWidth,0,zoneWidth,150);
        ctx.strokeStyle="rgba(255,255,255,0.3)";
        ctx.strokeRect(i*zoneWidth,0,zoneWidth,150);

        if(event){
            ctx.fillStyle="white";
            ctx.textAlign="center";
            ctx.fillText(event.type.toUpperCase(), i*zoneWidth+zoneWidth/2, 25);
        }
    }

    ctx.fillStyle="#2faa2f";
    ctx.fillRect(0,150,600,550);

    ctx.fillStyle="white";
    ctx.save();
    ctx.translate(homePlate.x,homePlate.y);
    ctx.rotate(Math.PI/4);
    ctx.fillRect(-homePlate.size/2,-homePlate.size/2,
                 homePlate.size,homePlate.size);
    ctx.restore();

    ctx.fillStyle="blue";
    ctx.beginPath();
    ctx.arc(pitcher.x,pitcher.y,15,0,Math.PI*2);
    ctx.fill();

    ctx.fillStyle="black";
    ctx.beginPath();
    ctx.arc(batter.x,batter.y,15,0,Math.PI*2);
    ctx.fill();

    // バット
    ctx.save();
    ctx.translate(batter.x,batter.y);
    ctx.rotate(batAngle);
    ctx.fillStyle="brown";
    ctx.fillRect(0,-4,60,8);
    ctx.restore();

    ctx.fillStyle="red";
    fielders.forEach(f=>{
        ctx.beginPath();
        ctx.arc(f.x,f.y,12,0,Math.PI*2);
        ctx.fill();
    });

    if(ball){
        ctx.fillStyle="white";
        ctx.beginPath();
        ctx.arc(ball.x,ball.y,8,0,Math.PI*2);
        ctx.fill();
    }
}

function update(){

    if(state==="pitch"){
        ball.y+=ball.vy;

        if(ball.y>=homePlate.y){
            if(Math.abs(ball.x-homePlate.x)>homePlate.size/2){
                balls++;
                if(balls>=4){
                    score++;
                    resetCount();
                    generateOutfieldEvents();
                }
            }else{
                strikes++;
                if(strikes>=3) addOut();
            }
            endPitch();
        }
    }

    if(state==="hit"){
        ball.x+=ball.vx;
        ball.y+=ball.vy;

        for(let f of fielders){
            let dx=ball.x-f.x;
            let dy=ball.y-f.y;
            if(Math.sqrt(dx*dx+dy*dy)<18){
                addOut();
                endPitch();
                return;
            }
        }

        if(ball.y<150){
            let zoneIndex=Math.floor(ball.x/(canvas.width/5));
            let found=outfieldEvents.find(e=>e.zone===zoneIndex);

            if(found){
                if(found.type==="double") score+=2;
                if(found.type==="triple") score+=3;
                if(found.type==="homerun") score=score>0?score*2:2;
            }else{
                score+=1;
            }

            if(score>bestScore) bestScore=score;

            resetCount();
            generateOutfieldEvents();
            endPitch();
        }
    }

    // ===== スイング制御 =====
    if(swinging){

        if(isRightHand){
            batAngle += 0.25;
            swingProgress += 0.25;

            if(swingProgress >= Math.PI*2){
                swinging=false;
                swingProgress=0;
                batAngle=Math.PI;
            }

        }else{
            batAngle -= 0.25;
            swingProgress += 0.25;

            if(swingProgress >= Math.PI){
                swinging=false;
                swingProgress=0;
                batAngle=0;
            }
        }
    }
}

function swing(){
    if(state!=="pitch")return;

    swinging=true;
    swingProgress=0;

    batAngle = isRightHand ? Math.PI : 0;

    if(Math.abs(ball.y-batter.y)<30 &&
       Math.abs(ball.x-batter.x)<70){

        state="hit";
        ball.vx=(isRightHand?-5:5);
        ball.vy=-6;
    }else{
        strikes++;
        if(strikes>=3) addOut();
        endPitch();
    }
}

function addOut(){
    outs++;
    resetCount();
    generateOutfieldEvents();
    if(outs>=3){
        score=0;
        outs=0;
    }
}

function resetCount(){
    balls=0;
    strikes=0;
}

function endPitch(){
    state="wait";
    ball=null;
    setTimeout(()=>{newPitch();},3000);
}

document.addEventListener("keydown",e=>{
    if(e.code==="Space"||e.code==="Enter"){
        swing();
    }
});

function loop(){
    update();
    draw();
    document.getElementById("score").innerText=score;
    document.getElementById("best").innerText=bestScore;
    document.getElementById("balls").innerText=balls;
    document.getElementById("strikes").innerText=strikes;
    document.getElementById("outs").innerText=outs;
    requestAnimationFrame(loop);
}

updateBatterPosition();
loop();
</script>

</body>
</html>
